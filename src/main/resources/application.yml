# Resilience4j — instancias alineadas con el arg "name" del filtro CircuitBreaker
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://127.0.0.1:9190
      client:
        registration:
          client-app:
            provider: spring
            client-id: gateway-app
            client-secret: 12345
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
            - openid 
            - profile
            client-name: client-app
        provider: 
          spring:
            issuer-uri: http://127.0.0.1:9190
            token-uri: http://127.0.0.1:9190/oauth2/token
            authorization-uri: http://127.0.0.1:9190/oauth2/authorize

  cloud:
    circuitbreaker:
      resilience4j:
        disable-time-limiter: false
    gateway:
      server:
        webflux:
          routes:
            - id: oauth-auth
              uri: lb://oauth
              predicates:
                - Path=/api/auth/**
                - Method=GET,POST,PUT,DELETE,PATCH,HEAD,OPTIONS
              filters:
                - StripPrefix=0
                - name: AddRequestHeader
                  args:
                    name: X-Internal-Token
                    value: ${GATEWAY_INTERNAL_TOKEN:1234567890}
            - id: oauth
              uri: lb://oauth
              predicates:
                - Path=/api/security/**
                - Method=GET,POST,PUT,DELETE,PATCH,HEAD,OPTIONS
              filters:
                - StripPrefix=0
            - id: msvc-users
              uri: lb://msvc-users
              predicates:
                - Path=/api/users/**
                - Method=GET,POST,PUT,DELETE,PATCH,HEAD,OPTIONS
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    name: users
                    fallbackUri: forward:/fallback/users
                    statusCodes: BAD_GATEWAY,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR,SERVICE_UNAVAILABLE
            - id: msvc-products
              uri: lb://msvc-products
              predicates:
                - Path=/api/product/**
                - Method=GET,POST,PUT,DELETE,PATCH,HEAD,OPTIONS
                # Dev/práctica (descomentar para el curso):
                # - Header=token, \d+
                # - Query=color, verde
                # - Cookie=color, azul
                # - Header=Content-Type, application/json
              filters:
                - StripPrefix=2
                #- name: CircuitBreaker
                #  args:
                #    name: products
                #    fallbackUri: forward:/fallback/products
                #    statusCodes: BAD_GATEWAY,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR,SERVICE_UNAVAILABLE
                # Dev/práctica:
                # - ApiGatewayCookie=Este es un mensaje de prueba,nombre,Niilton
            - id: msvc-items
              uri: lb://msvc-items
              predicates:
                - Path=/api/items/**
              filters:
                - StripPrefix=2
                - name: CircuitBreaker
                  args:
                    name: items
                    fallbackUri: forward:/fallback/items
                    statusCodes: BAD_GATEWAY,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR,SERVICE_UNAVAILABLE
                - name: AddRequestHeader
                  args:
                    name: token-request
                    value: ${GATEWAY_INTERNAL_TOKEN:1234567890}
                # Dev/práctica:
                # - AddResponseHeader=token-response,ajsdhdgclsaidh
                # - AddRequestParameter=name, Niilton GR


resilience4j:
  timelimiter:
    instances:
      products:
        timeoutDuration: 3s
        cancelRunningFuture: true
      items:
        timeoutDuration: 3s
        cancelRunningFuture: true
  circuitbreaker:
    instances:
      products:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 50
      items:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slowCallDurationThreshold: 3s
        slowCallRateThreshold: 50
